<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movixy Player</title>
  <style>
    body { margin: 0; background: #0a0a0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; padding: 20px; text-align: center; }
    h1 { font-size: 32px; font-weight: 900; background: linear-gradient(135deg,#7c3aed,#a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p { color: rgba(255,255,255,0.45); font-size: 15px; max-width: 400px; line-height: 1.6; }
    code { display: block; background: #1a1a26; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 14px 18px;
      font-size: 13px; color: #a78bfa; text-align: left; margin: 8px 0; line-height: 1.8; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Movixy Player</h1>
  <p>Pass a TMDB ID to play any movie or TV show.</p>
  <div>
    <code>/player?tmdb=550&amp;type=movie&amp;title=Fight+Club</code>
    <code>/player?tmdb=1396&amp;type=tv&amp;s=1&amp;e=1&amp;title=Breaking+Bad</code>
  </div>
</body>
</html>
